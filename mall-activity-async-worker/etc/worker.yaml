Name: activity-async-worker
Concurrency: 50

Redis:
  Addr: 127.0.0.1:6379
  DB: 0

Queues:
  signin: 5
  lottery: 5
  seckill: 10
  coupon: 5
  default: 1

# H-2 T+3 settlement
OrderDSN: proxysql:proxysql123@tcp(127.0.0.1:6033)/mall_order?charset=utf8mb4&parseTime=true&loc=Local
PaymentDSN: proxysql:proxysql123@tcp(127.0.0.1:6033)/mall_payment?charset=utf8mb4&parseTime=true&loc=Local
SettlementDelaySec: 259200
SettlementIntervalSec: 300

# S1.4 auto-cancel pending orders past cashier TTL
PendingOrderTimeoutSec: 900
CancelIntervalSec: 60
