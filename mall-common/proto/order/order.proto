syntax = "proto3";

package order;

option go_package = "./order";

message OrderItem {
  int64 product_id = 1;
  string product_name = 2;
  int64 price = 3;
  int32 quantity = 4;
}

message CreateOrderReq {
  int64 user_id = 1;
  repeated OrderItem items = 2;
  int64 address_id = 3;
}

message CreateOrderResp {
  int64 id = 1;
  string order_no = 2;
  int64 total_amount = 3;
}

message GetOrderReq {
  int64 id = 1;
}

message GetOrderResp {
  int64 id = 1;
  string order_no = 2;
  int64 user_id = 3;
  int64 total_amount = 4;
  int32 status = 5;
  repeated OrderItem items = 6;
  int64 create_time = 7;
  int64 address_id = 8;
  string receiver_name = 9;
  string receiver_phone = 10;
  string receiver_province = 11;
  string receiver_city = 12;
  string receiver_district = 13;
  string receiver_detail = 14;
  int64 pay_time = 15;
  int64 ship_time = 16;
  int64 complete_time = 17;
  int64 cancel_time = 18;
  string cancel_reason = 19;
}

message ListOrdersReq {
  int64 user_id = 1;
  int32 status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListOrdersResp {
  repeated GetOrderResp orders = 1;
  int64 total = 2;
}

message UpdateOrderStatusReq {
  int64 id = 1;
  int32 status = 2;
}

message UpdateOrderStatusResp {}

// ===== Pre-order (seckill SAGA branches) =====
message CreatePreOrderReq {
  int64 user_id = 1;
  int64 activity_id = 2;
  repeated OrderItem items = 3;
  string idempotency_key = 4;
}

message CreatePreOrderResp {
  int64 id = 1;
  string order_no = 2;
}

message CancelPreOrderReq {
  int64 id = 1;
  string idempotency_key = 2;
  string reason = 3;
}

message CancelPreOrderResp {}

message GetOrderItemReq {
  int64 order_item_id = 1;
}

message GetOrderItemResp {
  int64 order_item_id = 1;
  int64 order_id = 2;
  int64 user_id = 3;
  int64 product_id = 4;
  int64 quantity = 5;
  int32 order_status = 6;
  int64 create_time = 7;
}

// ===== Merchant Order Management =====
message OkResp { bool ok = 1; }

message ListShopOrdersReq {
  int64 shop_id = 1;
  int32 status = 2;   // -1 = all
  int32 page = 3;
  int32 page_size = 4;
}

message GetShopOrderReq { int64 id = 1; int64 shop_id = 2; }

message ShipOrderReq {
  int64  id = 1;
  int64  shop_id = 2;
  string carrier = 3;
  string tracking_no = 4;
}

message MerchantRejectRefundReq {
  int64  id = 1;
  int64  shop_id = 2;
  string reason = 3;
}

// ===== S2 Refund state machine =====
message RefundItem {
  int64 sku_id = 1;
  string sku_name = 2;
  int32 quantity = 3;
  int64 amount = 4;  // cents
}

message RefundRequest {
  int64 id = 1;
  int64 order_id = 2;
  string order_no = 3;
  int64 user_id = 4;
  int64 shop_id = 5;
  int64 amount = 6;
  string reason = 7;
  repeated string evidence = 8;
  repeated RefundItem items = 9;   // empty = full-order refund
  int32 status = 10;
  int64 merchant_user_id = 11;
  string merchant_remark = 12;
  int64 merchant_handle_time = 13;
  int64 admin_id = 14;
  string admin_remark = 15;
  int64 admin_handle_time = 16;
  string appeal_reason = 17;
  int64 appeal_time = 18;
  string refund_no = 19;
  int64 refund_complete_time = 20;
  int64 create_time = 21;
  int32 refund_type = 22;                // 1=refund_only 2=return_refund 3=exchange
  string return_tracking_no = 23;
  string return_carrier = 24;
  int64 return_ship_time = 25;
  int64 return_received_time = 26;
  int32 return_inspection_passed = 27;   // 0=未验 1=通过 2=拒收
  int64 exchange_new_order_id = 28;
}

message SubmitRefundRequestReq {
  int64 order_id = 1;
  int64 user_id = 2;
  int64 amount = 3;
  string reason = 4;
  repeated string evidence = 5;
  repeated RefundItem items = 6;
  int32 refund_type = 7;   // default 1
}

message UserShipReturnReq {
  int64 refund_id = 1;
  int64 user_id = 2;
  string tracking_no = 3;
  string carrier = 4;
}

message MerchantInspectReturnReq {
  int64 refund_id = 1;
  int64 shop_id = 2;
  int64 merchant_user_id = 3;
  bool passed = 4;
  string remark = 5;
}

message MerchantShipExchangeReq {
  int64 refund_id = 1;
  int64 shop_id = 2;
  int64 merchant_user_id = 3;
  string tracking_no = 4;
  string carrier = 5;
}
message MerchantShipExchangeResp {
  int64 new_order_id = 1;
  string new_order_no = 2;
}
message SubmitRefundRequestResp { int64 refund_id = 1; }

message GetRefundRequestReq { int64 id = 1; int64 user_id = 2; }
message ListUserRefundRequestsReq { int64 user_id = 1; int32 status = 2; int32 page = 3; int32 page_size = 4; }
message ListShopRefundRequestsReq { int64 shop_id = 1; int32 status = 2; int32 page = 3; int32 page_size = 4; }
message ListPendingArbitrationsReq { int32 page = 1; int32 page_size = 2; }
message ListRefundRequestsResp { repeated RefundRequest requests = 1; int64 total = 2; }
message MerchantHandleRefundReq {
  int64 refund_id = 1;
  int64 shop_id = 2;
  int64 merchant_user_id = 3;
  int32 action = 4;  // 1=approve 2=reject
  string remark = 5;
}
message UserAppealRefundReq {
  int64 refund_id = 1;
  int64 user_id = 2;
  string reason = 3;
}
message AdminArbitrateRefundReq {
  int64 refund_id = 1;
  int64 admin_id = 2;
  int32 action = 3;  // 1=force_refund 2=final_reject
  string remark = 5;
}

service Order {
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderResp);
  rpc GetOrder(GetOrderReq) returns (GetOrderResp);
  rpc ListOrders(ListOrdersReq) returns (ListOrdersResp);
  rpc UpdateOrderStatus(UpdateOrderStatusReq) returns (UpdateOrderStatusResp);
  rpc CreatePreOrder(CreatePreOrderReq) returns (CreatePreOrderResp);
  rpc CancelPreOrder(CancelPreOrderReq) returns (CancelPreOrderResp);
  rpc GetOrderItem(GetOrderItemReq) returns (GetOrderItemResp);
  rpc MarkShipped(MarkShippedReq) returns (MarkShippedResp);
  rpc ListShopOrders(ListShopOrdersReq) returns (ListOrdersResp);
  rpc GetShopOrder(GetShopOrderReq) returns (GetOrderResp);
  rpc ShipOrder(ShipOrderReq) returns (OkResp);
  rpc MerchantRejectRefund(MerchantRejectRefundReq) returns (OkResp);

  // ===== S2 Refund state machine =====
  rpc SubmitRefundRequest(SubmitRefundRequestReq) returns (SubmitRefundRequestResp);
  rpc GetRefundRequest(GetRefundRequestReq) returns (RefundRequest);
  rpc ListUserRefundRequests(ListUserRefundRequestsReq) returns (ListRefundRequestsResp);
  rpc ListShopRefundRequests(ListShopRefundRequestsReq) returns (ListRefundRequestsResp);
  rpc ListPendingArbitrations(ListPendingArbitrationsReq) returns (ListRefundRequestsResp);
  rpc MerchantHandleRefund(MerchantHandleRefundReq) returns (OkResp);
  rpc UserAppealRefund(UserAppealRefundReq) returns (OkResp);
  rpc AdminArbitrateRefund(AdminArbitrateRefundReq) returns (OkResp);

  // ===== S3 Return / Exchange =====
  rpc UserShipReturn(UserShipReturnReq) returns (OkResp);
  rpc MerchantInspectReturn(MerchantInspectReturnReq) returns (OkResp);
  rpc MerchantShipExchange(MerchantShipExchangeReq) returns (MerchantShipExchangeResp);
}

message MarkShippedReq {
  int64 order_id = 1;
  string tracking_no = 2;
  string carrier = 3;
}

message MarkShippedResp {
  bool ok = 1;
}
