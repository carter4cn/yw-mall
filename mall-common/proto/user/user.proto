syntax = "proto3";

package user;

option go_package = "./user";

message RegisterReq {
  string username = 1;
  string password = 2;
  string phone = 3;
}

message RegisterResp {
  int64 id = 1;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginResp {
  int64 id = 1;
  string token = 2;            // = access_token, kept for backward compatibility
  string refresh_token = 3;
  int32 expires_in = 4;        // access_token TTL in seconds
  string csrf_token = 5;
  // S4.3 password expiry: front-end must reLaunch to change-password.
  bool password_expired = 6;
}

// ===== Session (P0 login revamp: opaque token + Redis) =====
message Empty {}

message SessionInfo {
  int64 uid = 1;
  string username = 2;
  string role = 3;             // user / admin / merchant
  int64 shop_id = 4;           // only meaningful for merchant
  string access_token = 5;
  string refresh_token = 6;
  int32 expires_in = 7;        // access_token TTL in seconds
  string csrf_token = 8;
  int64 login_time = 9;
  repeated string perms = 10;  // admin RBAC perms; empty for non-admin
}

message CreateSessionReq {
  int64 uid = 1;
  string username = 2;
  string role = 3;
  int64 shop_id = 4;
  string device_id = 5;
  string ip = 6;
  repeated string perms = 7;   // admin RBAC perms; pass nil for non-admin
}

message ValidateSessionReq {
  string access_token = 1;
}

message RefreshSessionReq {
  string refresh_token = 1;
  string device_id = 2;
}

message DestroySessionReq {
  string access_token = 1;
}

message DestroyAllUserSessionsReq {
  int64 uid = 1;
}

message GetUserReq {
  int64 id = 1;
}

message GetUserResp {
  int64 id = 1;
  string username = 2;
  string phone = 3;
  string avatar = 4;
  int64 create_time = 5;
}

message UpdateUserReq {
  int64 id = 1;
  string phone = 2;
  string avatar = 3;
}

message UpdateUserResp {}

// ===== Points (DTM SAGA branches) =====
message AddPointsReq {
  int64 user_id = 1;
  int64 amount = 2;
  string reason = 3;
  // idempotency_key prevents double-grant on retries; same key = no-op
  string idempotency_key = 4;
}

message AddPointsResp {
  int64 balance = 1;
}

message DeductPointsReq {
  int64 user_id = 1;
  int64 amount = 2;
  string reason = 3;
  string idempotency_key = 4;
}

message DeductPointsResp {
  int64 balance = 1;
}

// ===== Address =====
message OkResp { bool ok = 1; }

message Address {
  int64  id            = 1;
  int64  user_id       = 2;
  string receiver_name = 3;
  string phone         = 4;
  string province      = 5;
  string city          = 6;
  string district      = 7;
  string detail        = 8;
  bool   is_default    = 9;
  int64  create_time   = 10;
}

message AddAddressReq        { int64 user_id = 1; string receiver_name = 2; string phone = 3; string province = 4; string city = 5; string district = 6; string detail = 7; bool is_default = 8; }
message AddAddressResp       { int64 id = 1; }
message UpdateAddressReq     { int64 user_id = 1; int64 id = 2; string receiver_name = 3; string phone = 4; string province = 5; string city = 6; string district = 7; string detail = 8; }
message DeleteAddressReq     { int64 user_id = 1; int64 id = 2; }
message SetDefaultAddressReq { int64 user_id = 1; int64 id = 2; }
message ListAddressesReq     { int64 user_id = 1; }
message ListAddressesResp    { repeated Address addresses = 1; }
message GetAddressReq        { int64 user_id = 1; int64 id = 2; }
message GetDefaultAddressReq { int64 user_id = 1; }

// ===== Admin Account =====
message AdminInfo {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string permissions = 5;
  int32 status = 6;
  int64 create_time = 7;
}

message AdminLoginReq { string username = 1; string password = 2; }
message AdminLoginResp {
  int64 id = 1;
  string username = 2;
  string role = 3;
  string permissions = 4;
  // S4.3: when the stored last_password_change is older than the policy's
  // MaxAgeDays the gateway must redirect the admin to the change-password page.
  bool password_expired = 5;
  // S4.1: when the admin has MFA enabled the gateway must NOT mint a session;
  // it returns mfa_required + a short-lived challenge token instead.
  bool mfa_required = 6;
  string challenge_token = 7;
}

message CreateAdminReq { string username = 1; string password = 2; string email = 3; string role = 4; string permissions = 5; }
message CreateAdminResp { int64 id = 1; }

message ListAdminsReq { int32 page = 1; int32 page_size = 2; }
message ListAdminsResp { repeated AdminInfo admins = 1; int64 total = 2; }

message GetAdminByIdReq { int64 id = 1; }

message UpdateAdminStatusReq { int64 id = 1; int32 status = 2; }

// ===== User Admin Management =====
message ListUsersReq { int32 page = 1; int32 page_size = 2; string keyword = 3; }
message ListUsersResp { repeated GetUserResp users = 1; int64 total = 2; }

message UpdateUserStatusReq { int64 id = 1; int32 status = 2; }

// ===== S4.3 ChangePassword =====
// SubjectType: 1=user, 2=admin. The RPC verifies oldPassword, runs the
// strength + history check on newPassword, and bumps last_password_change.
message ChangePasswordReq {
  int32 subject_type = 1;
  int64 subject_id = 2;
  string old_password = 3;
  string new_password = 4;
}
message ChangePasswordResp { bool ok = 1; }

// ===== S4.2 Admin IP whitelist =====
message AdminIpWhitelistEntry {
  int64 id = 1;
  int64 admin_id = 2;
  string cidr = 3;
  string note = 4;
  int64 create_time = 5;
}
message ListAdminIpWhitelistReq { int64 admin_id = 1; }
message ListAdminIpWhitelistResp { repeated AdminIpWhitelistEntry items = 1; }
message AddAdminIpWhitelistReq { int64 admin_id = 1; string cidr = 2; string note = 3; }
message AddAdminIpWhitelistResp { int64 id = 1; }
message DeleteAdminIpWhitelistReq { int64 id = 1; int64 admin_id = 2; }

// ===== S4.1 Admin MFA (TOTP) =====
message EnableAdminMfaReq { int64 admin_id = 1; }
message EnableAdminMfaResp {
  string totp_secret = 1;
  string qr_url = 2;
  repeated string backup_codes = 3;
}
message ConfirmAdminMfaReq { int64 admin_id = 1; string code = 2; }
message VerifyAdminMfaReq { int64 admin_id = 1; string code = 2; }
message DisableAdminMfaReq { int64 admin_id = 1; string code = 2; }
message GetAdminMfaStatusReq { int64 admin_id = 1; }
message GetAdminMfaStatusResp { bool enabled = 1; int64 last_used_at = 2; }

// ===== S4.4 KYC =====
message SubmitKycReq {
  int64 user_id = 1;
  string real_name = 2;
  string id_card_no = 3;
  string id_card_front_url = 4;
  string id_card_back_url = 5;
  string face_video_url = 6;
}
message SubmitKycResp { string request_id = 1; int32 status = 2; }
message GetKycStatusReq { int64 user_id = 1; }
message GetKycStatusResp {
  int32 status = 1;             // 0=未提交 1=审核中 2=通过 3=拒绝
  string reject_reason = 2;
  int64 submit_time = 3;
  int64 audit_time = 4;
  string real_name = 5;         // already decrypted
  string id_card_no = 6;        // already decrypted (masked client-side)
}
message ListPendingKycReq { int32 page = 1; int32 page_size = 2; }
message KycPendingItem {
  int64 user_id = 1;
  string username = 2;
  string real_name = 3;
  string id_card_no = 4;
  string id_card_front_url = 5;
  string id_card_back_url = 6;
  string face_video_url = 7;
  int64 submit_time = 8;
  int32 status = 9;
}
message ListPendingKycResp { repeated KycPendingItem items = 1; int64 total = 2; }
message AdminAuditKycReq {
  int64 user_id = 1;
  bool pass = 2;
  string reason = 3;
  int64 audit_admin_id = 4;
}

service User {
  rpc Register(RegisterReq) returns (RegisterResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc GetUser(GetUserReq) returns (GetUserResp);
  rpc UpdateUser(UpdateUserReq) returns (UpdateUserResp);
  rpc AddPoints(AddPointsReq) returns (AddPointsResp);
  rpc DeductPoints(DeductPointsReq) returns (DeductPointsResp);
  rpc AddAddress(AddAddressReq) returns (AddAddressResp);
  rpc UpdateAddress(UpdateAddressReq) returns (OkResp);
  rpc DeleteAddress(DeleteAddressReq) returns (OkResp);
  rpc SetDefaultAddress(SetDefaultAddressReq) returns (OkResp);
  rpc ListAddresses(ListAddressesReq) returns (ListAddressesResp);
  rpc GetAddress(GetAddressReq) returns (Address);
  rpc GetDefaultAddress(GetDefaultAddressReq) returns (Address);
  rpc AdminLogin(AdminLoginReq) returns (AdminLoginResp);
  rpc CreateAdmin(CreateAdminReq) returns (CreateAdminResp);
  rpc ListAdmins(ListAdminsReq) returns (ListAdminsResp);
  rpc GetAdminById(GetAdminByIdReq) returns (AdminInfo);
  rpc UpdateAdminStatus(UpdateAdminStatusReq) returns (OkResp);
  rpc ListUsers(ListUsersReq) returns (ListUsersResp);
  rpc UpdateUserStatus(UpdateUserStatusReq) returns (OkResp);

  // Session RPCs (opaque token + Redis-backed)
  rpc CreateSession(CreateSessionReq) returns (SessionInfo);
  rpc ValidateSession(ValidateSessionReq) returns (SessionInfo);
  rpc RefreshSession(RefreshSessionReq) returns (SessionInfo);
  rpc DestroySession(DestroySessionReq) returns (Empty);
  rpc DestroyAllUserSessions(DestroyAllUserSessionsReq) returns (Empty);

  // S4.3 password policy
  rpc ChangePassword(ChangePasswordReq) returns (ChangePasswordResp);

  // S4.2 admin IP whitelist
  rpc ListAdminIpWhitelist(ListAdminIpWhitelistReq) returns (ListAdminIpWhitelistResp);
  rpc AddAdminIpWhitelist(AddAdminIpWhitelistReq) returns (AddAdminIpWhitelistResp);
  rpc DeleteAdminIpWhitelist(DeleteAdminIpWhitelistReq) returns (OkResp);

  // S4.1 admin MFA
  rpc EnableAdminMfa(EnableAdminMfaReq) returns (EnableAdminMfaResp);
  rpc ConfirmAdminMfa(ConfirmAdminMfaReq) returns (OkResp);
  rpc VerifyAdminMfa(VerifyAdminMfaReq) returns (OkResp);
  rpc DisableAdminMfa(DisableAdminMfaReq) returns (OkResp);
  rpc GetAdminMfaStatus(GetAdminMfaStatusReq) returns (GetAdminMfaStatusResp);

  // S4.4 KYC
  rpc SubmitKyc(SubmitKycReq) returns (SubmitKycResp);
  rpc GetKycStatus(GetKycStatusReq) returns (GetKycStatusResp);
  rpc ListPendingKyc(ListPendingKycReq) returns (ListPendingKycResp);
  rpc AdminAuditKyc(AdminAuditKycReq) returns (OkResp);
}
